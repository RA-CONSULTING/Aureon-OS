# Aureon SaaS console — production nginx config.
# Serves the built React console and proxies /api to the operator gateway
# (one origin for the browser: no CORS, no hardcoded backend hosts).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Operator + SaaS gateway (catalog, domains, status, manifests, cognition).
    location /api/ {
        proxy_pass http://aureon-operator:8790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Command stream (WebSocket) on the same origin.
    location /command-stream {
        proxy_pass http://aureon-operator:8790;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Health probes pass straight through to the gateway.
    location = /healthz { proxy_pass http://aureon-operator:8790; }
    location = /readyz  { proxy_pass http://aureon-operator:8790; }

    # Hashed build assets are immutable; cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest JSONs in the static root are fallbacks — never cache them.
    location ~ ^/aureon_.*\.json$ {
        add_header Cache-Control "no-store";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
