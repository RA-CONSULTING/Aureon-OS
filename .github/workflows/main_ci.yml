name: Aureon CI

# Repo-wide smoke gate: the whole tree compiles, and the product-surface test
# suite passes offline (no keys, no network). The deep strict tier (ruff + mypy)
# lives in operator-ci.yml; this workflow is the broad "does it import and run"
# signal. Runs on GitHub-hosted Actions once enabled on the org.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: aureon-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: compile + offline test suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    env:
      AUREON_LLM_OFFLINE: "1"
      AUREON_SUPPRESS_IMPORT_SIDE_EFFECTS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (operator + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[operator,dev]'
      - name: Compile-all (whole package parses on 3.12)
        run: python -m compileall -q aureon/ -x "(__pycache__|imports|archive)"
      - name: Offline test suite (product surface)
        run: pytest tests/test_operator_server.py tests/test_operator_cognition.py tests/test_operator_production.py tests/test_aureon_operator.py tests/test_saas_catalog.py tests/test_saas_gateway.py tests/test_saas_billing.py tests/test_connectome.py -q
